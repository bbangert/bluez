name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  OTP_VERSION: "29.0.3"
  ELIXIR_VERSION: "1.20.2-otp-29"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix format --check-formatted
      - run: mix test --warnings-as-errors

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          elixir-version: ${{ env.ELIXIR_VERSION }}
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-dev-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
        env:
          MIX_ENV: dev
      - uses: actions/cache@v4
        with:
          path: priv/plts
          key: plt-${{ env.ELIXIR_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: plt-${{ env.ELIXIR_VERSION }}-
      - run: mix deps.get
      - run: mix dialyzer
